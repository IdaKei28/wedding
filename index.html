<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Wedding</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hero -->
  <header class="hero">
    <p class="hero-subtitle">Our Wedding</p>
    <h1 class="hero-title">啓介 ＆ 佑衣</h1>
    <p class="hero-date">2026年 5月 16日</p>
  </header>

  <!-- Message -->
  <section class="message">
    <h2 class="section-title">ご挨拶</h2>
    <p>
      このたび、私たちは結婚式に参加していただきありがとうございます。<br>
      これまで支えていただいた皆様方的感謝申し上げます。<br>
      新しい門出を皆様と一緒に迎えられることを、心より嬉しく思います。<br>
      ぜひご出席いただき、温かいご祝福を賜りますようお願い申し上げます。
    </p>
  </section>

  <!-- Details -->
  <section class="details">
    <h2 class="section-title">各種リンク</h2>
    <div class="details-grid">
      <div class="detail-card">
        <h3>謎解き</h3>
        <p><a href="https://example.com/puzzle">謎解きページへ</a></p>
      </div>
      <div class="detail-card">
        <h3>写真共有</h3>
        <p><a href="https://example.com/photos">写真共有ページへ</a></p>
      </div>
      <div class="detail-card">
        <h3>ミニゲーム</h3>
        <p><a href="https://example.com/game">ミニゲームへ</a></p>
      </div>
    </div>
  </section>

  <!-- Gallery -->
  <section class="gallery">
    <h2 class="section-title">写真ギャラリー</h2>
    <div class="gallery-grid">
      <img src="https://images.unsplash.com/photo-1511285560982-1356c11d4606?w=400" alt=" Wedding Photo 1">
      <img src="https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=400" alt="Wedding Photo 2">
      <img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=400" alt="Wedding Photo 3">
      <img src="https://images.unsplash.com/photo-1529636798458-92182e662485?w=400" alt="Wedding Photo 4">
    </div>
  </section>

  <!-- RSVP -->
   <!--
  <section class="rsvp">
    <h2 class="section-title">出欠のご連絡</h2>
    <p>ご出席いただける方は、<br>9月10日までにご連絡ください。</p>
    <a href="mailto:example@email.com" class="rsvp-button">メールを送る</a>
  </section>
    -->

  <!-- Footer -->
  <footer>
    <p>啓介 ＆ 佑衣</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
